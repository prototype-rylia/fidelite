<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rylia — Connexion</title>
    <link rel="icon" type="image/png" href="logo-rylia.png">

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --primary-orange: #FF6B00;
            --dark-orange:    #E56000;
            --text-dark:      #1a1a1a;
            --text-light:     #444;
            --bg-light:       #f9f9f9;
            --border:         #e0e0e0;
            --danger-bg:      #ffe6e6;
            --danger-color:   #dc3545;
            --radius:         8px;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-light);
            color: var(--text-dark);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .login-container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }

        .login-card {
            background: white;
            padding: 40px 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            border-top: 4px solid var(--primary-orange);
            text-align: center;
        }

        .brand-name {
            font-weight: 800;
            font-size: 2.2rem;
            color: var(--primary-orange);
            letter-spacing: -1px;
            margin-bottom: 10px;
        }

        .login-subtitle {
            color: var(--text-light);
            font-size: 0.95rem;
            margin-bottom: 30px;
        }

        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 8px;
            color: var(--text-dark);
        }

        .form-input {
            width: 100%;
            padding: 14px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius);
            font-family: inherit;
            font-size: 1rem;
            transition: all 0.3s ease;
            color: var(--text-dark);
            background: white;
            outline: none;
        }

        .form-input:focus {
            border-color: var(--primary-orange);
            box-shadow: 0 0 0 3px rgba(255, 107, 0, 0.1);
        }

        .form-input::placeholder { color: #C4C9D4; }

        .input-wrapper { position: relative; }

        .toggle-password {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px;
            color: var(--text-light);
            display: flex;
            align-items: center;
            transition: color 0.2s;
        }
        .toggle-password:hover { color: var(--text-dark); }

        .btn-submit {
            width: 100%;
            background-color: var(--primary-orange);
            color: white;
            border: none;
            padding: 14px;
            font-size: 1.05rem;
            font-weight: 600;
            border-radius: var(--radius);
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.1s ease, box-shadow 0.2s;
            margin-top: 10px;
            font-family: inherit;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-submit:hover:not(:disabled) {
            background-color: var(--dark-orange);
            box-shadow: 0 4px 14px rgba(255, 107, 0, 0.3);
        }
        .btn-submit:active:not(:disabled) { transform: scale(0.98); }
        .btn-submit:disabled { opacity: 0.75; cursor: not-allowed; }

        .spinner {
            display: none;
            width: 18px; height: 18px;
            border: 2.5px solid rgba(255,255,255,0.4);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            flex-shrink: 0;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .forgot-link {
            display: block;
            text-align: right;
            font-size: 0.85rem;
            color: var(--text-light);
            text-decoration: none;
            margin-top: 6px;
            cursor: pointer;
            transition: color 0.3s;
            background: none;
            border: none;
            font-family: inherit;
            padding: 0;
            margin-left: auto;
        }
        .forgot-link:hover { color: var(--primary-orange); }

        .toggle-link {
            display: inline-block;
            margin-top: 20px;
            color: var(--text-light);
            text-decoration: none;
            font-size: 0.9rem;
            cursor: pointer;
            transition: color 0.3s;
            background: none;
            border: none;
            font-family: inherit;
        }
        .toggle-link:hover { color: var(--primary-orange); }

        #error-msg {
            color: var(--danger-color);
            font-size: 0.9rem;
            margin-top: 15px;
            font-weight: 600;
            display: none;
            background: var(--danger-bg);
            padding: 10px;
            border-radius: 6px;
        }

        #reset-msg {
            font-size: 0.85rem;
            margin-top: 12px;
            font-weight: 600;
            display: none;
            padding: 10px;
            border-radius: 6px;
        }
        #reset-msg.ok  { color: #065F46; background: #ECFDF5; }
        #reset-msg.err { color: var(--danger-color); background: var(--danger-bg); }

        @media (max-width: 440px) {
            .login-card { padding: 30px 20px; }
        }
    </style>
</head>
<body>

<div class="login-container">
    <div class="login-card">

        <div class="brand-name">Rylia.</div>
        <p class="login-subtitle" id="auth-title">Connectez-vous à votre espace</p>

        <!-- Prénom (inscription uniquement) -->
        <div class="form-group" id="firstname-field" style="display:none;">
            <label for="firstname">Prénom</label>
            <input type="text" id="firstname" class="form-input" placeholder="Votre prénom">
        </div>

        <!-- Email -->
        <div class="form-group">
            <label for="email">Adresse Email</label>
            <input type="email" id="email" class="form-input" placeholder="exemple@email.com" autocomplete="email" required>
        </div>

        <!-- Téléphone (inscription uniquement) -->
        <div class="form-group" id="phone-field" style="display:none;">
            <label for="phone">Numéro de téléphone</label>
            <input type="tel" id="phone" class="form-input" placeholder="06 12 34 56 78" maxlength="14">
        </div>

        <!-- Mot de passe -->
        <div class="form-group">
            <label for="password">Mot de passe</label>
            <div class="input-wrapper">
                <input type="password" id="password" class="form-input" placeholder="Votre mot de passe" autocomplete="current-password" required style="padding-right: 46px;">
                <button type="button" class="toggle-password" onclick="togglePwd('password')" aria-label="Afficher le mot de passe">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                    </svg>
                </button>
            </div>
        </div>

        <!-- Confirmer mot de passe (inscription uniquement) -->
        <div class="form-group" id="confirm-password-field" style="display:none;">
            <label for="confirm-password">Confirmer le mot de passe</label>
            <div class="input-wrapper">
                <input type="password" id="confirm-password" class="form-input" placeholder="Confirmez votre mot de passe" style="padding-right: 46px;">
                <button type="button" class="toggle-password" onclick="togglePwd('confirm-password')" aria-label="Afficher le mot de passe">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                    </svg>
                </button>
            </div>
        </div>

        <!-- Mot de passe oublié (connexion uniquement) -->
        <div id="forgot-password-container" style="text-align:right; margin-bottom:10px;">
            <button class="forgot-link" onclick="resetPassword()">Mot de passe oublié ?</button>
        </div>

        <!-- Bouton principal -->
        <button class="btn-submit" id="auth-btn" onclick="handleAuth()">
            <span class="spinner" id="spinner"></span>
            <span id="btn-label">Se connecter</span>
        </button>

        <!-- Toggle connexion / inscription -->
        <button class="toggle-link" id="toggle-btn" onclick="toggleMode()">Créer un compte</button>

        <div id="error-msg"></div>
        <div id="reset-msg"></div>

    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDf8Oh-d4baOxu3XoPV2rnLeLJZQ5tZDYY",
        authDomain: "rylia-fidelite-9a015.firebaseapp.com",
        projectId: "rylia-fidelite-9a015"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    const CLIENT_ID = "rylia";
    const profiles = db.collection("clients").doc(CLIENT_ID).collection("profiles");

    let signupMode = false;
    let isSigningUp = false; // Empêche la redirection prématurée pendant l'inscription

    // Redirection si déjà connecté
    auth.onAuthStateChanged((user) => {
        if (user && !isSigningUp) window.location.href = "index.html";
    });

    // ================= TOGGLE MODE =================
    function toggleMode() {
        signupMode = !signupMode;
        document.getElementById("firstname-field").style.display = signupMode ? "block" : "none";
        document.getElementById("phone-field").style.display = signupMode ? "block" : "none";
        document.getElementById("confirm-password-field").style.display = signupMode ? "block" : "none";
        document.getElementById("forgot-password-container").style.display = signupMode ? "none" : "block";
        document.getElementById("auth-title").innerText = signupMode ? "Créez votre compte fidélité" : "Connectez-vous à votre espace";
        document.getElementById("btn-label").innerText = signupMode ? "S'inscrire" : "Se connecter";
        document.getElementById("toggle-btn").innerText = signupMode ? "Déjà membre ? Se connecter" : "Créer un compte";
        hideMessages();
    }

    // ================= CONNEXION / INSCRIPTION =================
    async function handleAuth() {
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value.trim();
        const firstname = document.getElementById("firstname").value.trim();
        const phone = document.getElementById("phone").value.trim();
        const confirmPassword = document.getElementById("confirm-password").value.trim();

        hideMessages();

        if (!email || !password) {
            showError("Email et mot de passe requis.");
            return;
        }

        setLoading(true);

        try {
            if (signupMode) {
                const phoneClean = phone.replace(/\s/g, '');
                if (!phoneClean) { setLoading(false); showError("Le numéro de téléphone est requis."); return; }
                if (phoneClean.length !== 10) { setLoading(false); showError("Le numéro de téléphone doit contenir exactement 10 chiffres."); return; }
                if (password !== confirmPassword) { setLoading(false); showError("Les mots de passe ne correspondent pas."); return; }
                if (password.length < 6) { setLoading(false); showError("Le mot de passe doit faire au moins 6 caractères."); return; }

                isSigningUp = true; // Bloque la redirection auto déclenchée par onAuthStateChanged

                const res = await auth.createUserWithEmailAndPassword(email, password);
                const shortCode = Math.random().toString(36).substring(2, 8).toUpperCase();

                await profiles.doc(res.user.uid).set({
                    first_name: firstname || "Client",
                    email: email,
                    phone: phone,
                    points: 0,
                    short_code: shortCode,
                    role: "membre",
                    created_at: firebase.firestore.FieldValue.serverTimestamp()
                });

                // Profil bien créé → on peut rediriger en toute sécurité
                window.location.href = "index.html";
            } else {
                await auth.signInWithEmailAndPassword(email, password);
            }
        } catch (err) {
            setLoading(false);
            showError(getErrorMessage(err.code));
        }
    }

    // ================= MOT DE PASSE OUBLIÉ =================
    async function resetPassword() {
        const email = document.getElementById("email").value.trim();
        const resetMsg = document.getElementById("reset-msg");

        hideMessages();

        if (!email) {
            resetMsg.innerText = "Saisissez votre email ci-dessus, puis cliquez sur « Mot de passe oublié ».";
            resetMsg.className = "err";
            resetMsg.style.display = "block";
            return;
        }

        try {
            await auth.sendPasswordResetEmail(email);
            resetMsg.innerText = "Un lien de réinitialisation a été envoyé à " + email + ".";
            resetMsg.className = "ok";
            resetMsg.style.display = "block";
        } catch (e) {
            if (e.code === "auth/user-not-found" || e.code === "auth/invalid-email") {
                resetMsg.innerText = "Aucun compte trouvé avec cet email.";
            } else {
                resetMsg.innerText = "Erreur lors de l'envoi. Réessayez.";
            }
            resetMsg.className = "err";
            resetMsg.style.display = "block";
        }
    }

    // ================= HELPERS =================
    function getErrorMessage(code) {
        const map = {
            "auth/invalid-email":          "L'adresse e-mail n'est pas valide.",
            "auth/user-disabled":          "Ce compte a été désactivé.",
            "auth/user-not-found":         "Email ou mot de passe incorrect.",
            "auth/wrong-password":         "Email ou mot de passe incorrect.",
            "auth/invalid-credential":     "Email ou mot de passe incorrect.",
            "auth/email-already-in-use":   "Un compte existe déjà avec cette adresse.",
            "auth/weak-password":          "Mot de passe trop faible (6 caractères minimum).",
            "auth/too-many-requests":      "Trop de tentatives. Réessayez dans quelques minutes.",
            "auth/network-request-failed": "Problème de connexion. Vérifiez votre réseau."
        };
        return map[code] || "Une erreur est survenue. Réessayez.";
    }

    function showError(msg) {
        const box = document.getElementById("error-msg");
        box.innerText = msg;
        box.style.display = "block";
    }

    function hideMessages() {
        document.getElementById("error-msg").style.display = "none";
        document.getElementById("reset-msg").style.display = "none";
    }

    function setLoading(on) {
        document.getElementById("auth-btn").disabled = on;
        document.getElementById("spinner").style.display = on ? "block" : "none";
        document.getElementById("btn-label").textContent = on ? (signupMode ? "Inscription…" : "Connexion…") : (signupMode ? "S'inscrire" : "Se connecter");
    }

    function togglePwd(id) {
        const input = document.getElementById(id);
        input.type = input.type === "password" ? "text" : "password";
    }

    // Formatage téléphone
    document.addEventListener("DOMContentLoaded", () => {
        const phoneInput = document.getElementById("phone");
        if (phoneInput) {
            phoneInput.addEventListener("input", function (e) {
                let cleaned = e.target.value.replace(/\D/g, '').substring(0, 10);
                e.target.value = cleaned.match(/.{1,2}/g)?.join(' ') || '';
            });
        }
    });

    // Connexion avec Entrée
    document.addEventListener("keypress", (e) => {
        if (e.key === "Enter") handleAuth();
    });
</script>
</body>
</html>
