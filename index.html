<head>

  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* --- STYLES LOGIN RYLIA (identique à login.html) --- */
    .login-container { width: 100%; max-width: 400px; padding: 20px; }

    .login-card {
      background: white;
      padding: 40px 30px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.05);
      border-top: 4px solid #FF6B00;
      text-align: center;
    }

    .brand-name {
      font-weight: 800;
      font-size: 2.2rem;
      color: #FF6B00;
      letter-spacing: -1px;
      margin-bottom: 10px;
    }

    .login-subtitle {
      color: #444;
      font-size: 0.95rem;
      margin-bottom: 30px;
    }

    .login-form-group {
      text-align: left;
      margin-bottom: 20px;
    }

    .login-form-group label {
      display: block;
      font-weight: 600;
      font-size: 0.9rem;
      margin-bottom: 8px;
      color: #1a1a1a;
    }

    .login-form-input {
      width: 100%;
      padding: 14px;
      border: 1.5px solid #e0e0e0;
      border-radius: 8px;
      font-family: inherit;
      font-size: 1rem;
      transition: all 0.3s ease;
      background: white;
      color: #1a1a1a;
      box-sizing: border-box;
    }

    .login-form-input:focus {
      outline: none;
      border-color: #FF6B00;
      box-shadow: 0 0 0 3px rgba(255, 107, 0, 0.1);
    }

    .login-form-input::placeholder { color: #aaa; }

    .login-btn-submit {
      width: 100%;
      background-color: #FF6B00;
      color: white;
      border: none;
      padding: 14px;
      font-size: 1.05rem;
      font-weight: 600;
      border-radius: 8px;
      cursor: pointer;
      transition: background-color 0.3s ease, transform 0.1s ease;
      margin-top: 10px;
      font-family: inherit;
    }

    .login-btn-submit:hover { background-color: #E56000; }
    .login-btn-submit:active { transform: scale(0.98); }

    .login-forgot-link {
      display: block;
      text-align: right;
      font-size: 0.85rem;
      color: #444;
      text-decoration: none;
      margin-top: 6px;
      margin-bottom: 10px;
      cursor: pointer;
      transition: color 0.3s;
      background: none;
      border: none;
      font-family: inherit;
      padding: 0;
      margin-left: auto;
    }

    .login-forgot-link:hover { color: #FF6B00; }

    .login-toggle-link {
      display: inline-block;
      margin-top: 20px;
      color: #444;
      text-decoration: none;
      font-size: 0.9rem;
      cursor: pointer;
      transition: color 0.3s;
      background: none;
      border: none;
      font-family: inherit;
    }

    .login-toggle-link:hover { color: #FF6B00; }

    .login-error-msg {
      color: #dc3545;
      font-size: 0.9rem;
      margin-top: 15px;
      font-weight: 600;
      display: none;
      background: #ffe6e6;
      padding: 10px;
      border-radius: 6px;
      text-align: center;
    }

    .login-error-msg.show { display: block; }

    /* --- MENU PROFIL (panneau latéral mobile) --- */
    .profile-icon-btn {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 42px; height: 42px;
      border-radius: 50%;
      background: #FFF4E5;
      border: 2px solid #FF6B00;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      z-index: 50;
      transition: all 0.2s;
    }
    .profile-icon-btn:hover { background: #FFE5CC; transform: scale(1.05); }
    .profile-icon-btn svg { width: 22px; height: 22px; color: #FF6B00; }

    .profile-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.45);
      backdrop-filter: blur(3px);
      z-index: 900;
      opacity: 0;
      transition: opacity 0.25s ease;
    }
    .profile-overlay.show { display: block; opacity: 1; }

    .profile-panel {
      position: fixed; top: 0; right: -100%; bottom: 0;
      width: 100%; max-width: 360px;
      background: #fff;
      z-index: 950;
      transition: right 0.3s cubic-bezier(0.4,0,0.2,1);
      display: flex; flex-direction: column;
      box-shadow: -10px 0 40px rgba(0,0,0,0.15);
    }
    .profile-panel.show { right: 0; }

    .profile-panel-header {
      padding: 24px 20px 20px;
      border-bottom: 1px solid #E5E7EB;
      display: flex; align-items: center; justify-content: space-between;
    }
    .profile-panel-header h3 {
      font-size: 18px; font-weight: 800; color: #1a1a1a;
    }
    .profile-panel-close {
      width: 36px; height: 36px; border-radius: 50%;
      background: #f3f4f6; border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s;
    }
    .profile-panel-close:hover { background: #e5e7eb; }

    .profile-panel-body {
      flex: 1; overflow-y: auto; padding: 20px;
      display: flex; flex-direction: column; gap: 12px;
    }

    .profile-user-card {
      background: #FFF9F0; border: 1.5px solid #FFD9A8;
      border-radius: 12px; padding: 16px; text-align: center;
    }
    .profile-user-avatar {
      width: 56px; height: 56px; border-radius: 50%;
      background: #FF6B00; color: white;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 24px; font-weight: 800; margin-bottom: 8px;
    }
    .profile-user-name { font-size: 16px; font-weight: 700; color: #1a1a1a; }
    .profile-user-email { font-size: 13px; color: #6B7280; margin-top: 2px; }

    .profile-menu-item {
      display: flex; align-items: center; gap: 12px;
      width: 100%; padding: 14px 16px;
      background: #f9fafb; border: 1.5px solid #E5E7EB;
      border-radius: 10px; cursor: pointer;
      font-family: inherit; font-size: 14px; font-weight: 600;
      color: #1a1a1a; transition: all 0.15s;
      text-align: left;
    }
    .profile-menu-item:hover {
      background: #FFF4E5; border-color: #FF6B00; color: #FF6B00;
    }
    .profile-menu-item svg { flex-shrink: 0; width: 20px; height: 20px; color: #6B7280; }
    .profile-menu-item:hover svg { color: #FF6B00; }

    .profile-menu-item.danger {
      color: #dc2626; background: #FEF2F2; border-color: #FECACA;
    }
    .profile-menu-item.danger:hover {
      background: #FEE2E2; border-color: #dc2626;
    }
    .profile-menu-item.danger svg { color: #dc2626; }

    .profile-separator {
      height: 1px; background: #E5E7EB; margin: 4px 0;
    }

    /* Sous-sections dépliables dans le panel */
    .profile-sub-section {
      display: none; padding: 16px;
      background: #f9fafb; border: 1.5px solid #E5E7EB;
      border-radius: 10px; margin-top: -4px;
    }
    .profile-sub-section.show { display: block; }

    .profile-sub-title {
      font-size: 13px; font-weight: 700; color: #6B7280;
      text-transform: uppercase; letter-spacing: 0.04em;
      margin-bottom: 12px;
    }

    .profile-input {
      width: 100%; padding: 11px 14px;
      border: 1.5px solid #E5E7EB; border-radius: 8px;
      font-size: 14px; font-family: inherit;
      color: #1a1a1a; outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      margin-bottom: 8px;
      box-sizing: border-box;
    }
    .profile-input:focus {
      border-color: #FF6B00;
      box-shadow: 0 0 0 3px rgba(255,107,0,0.1);
    }

    .profile-btn-primary {
      width: 100%; padding: 11px;
      background: #FF6B00; color: white; border: none;
      border-radius: 8px; font-size: 14px; font-weight: 600;
      cursor: pointer; font-family: inherit;
      transition: background 0.15s;
    }
    .profile-btn-primary:hover { background: #E56000; }
    .profile-btn-primary:disabled { background: #ccc; cursor: not-allowed; }

    .profile-btn-danger {
      width: 100%; padding: 11px;
      background: #dc2626; color: white; border: none;
      border-radius: 8px; font-size: 14px; font-weight: 600;
      cursor: pointer; font-family: inherit;
      transition: background 0.15s;
    }
    .profile-btn-danger:hover { background: #b91c1c; }

    .profile-btn-cancel {
      width: 100%; padding: 11px;
      background: #f3f4f6; color: #374151; border: 1.5px solid #E5E7EB;
      border-radius: 8px; font-size: 14px; font-weight: 600;
      cursor: pointer; font-family: inherit;
      transition: all 0.15s;
    }
    .profile-btn-cancel:hover { background: #e5e7eb; }

    .profile-feedback {
      font-size: 13px; padding: 10px; border-radius: 8px;
      display: none; margin-top: 8px; font-weight: 600;
    }
    .profile-feedback.show { display: block; }
    .profile-feedback.success { background: #ECFDF5; color: #047857; }
    .profile-feedback.error { background: #FEF2F2; color: #991b1b; }
  </style>

</head>

  <script>
    // ================= FIREBASE CONFIG =================
    const firebaseConfig = {
      apiKey: "AIzaSyDf8Oh-d4baOxu3XoPV2rnLeLJZQ5tZDYY",
      authDomain: "rylia-fidelite-9a015.firebaseapp.com",
      projectId: "rylia-fidelite-9a015"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    // ================= CLIENT CONFIG =================
    // 👇 Modifier cette valeur pour chaque commerçant
    const CLIENT_ID = "rylia";
    // Raccourci vers la collection du client dans Firestore
    // Structure : clients/{CLIENT_ID}/profiles/{uid}
    const profiles = db.collection("clients").doc(CLIENT_ID).collection("profiles");
    const events = db.collection("clients").doc(CLIENT_ID).collection("events");

    let signupMode = false;
    let countdownInterval = null;

    // ================= TRADUCTION DES ERREURS =================
    function getErrorMessage(errorCode) {
      switch (errorCode) {
        case 'auth/invalid-email':
          return "L'adresse e-mail n'est pas valide.";
        case 'auth/user-disabled':
          return "Ce compte a été désactivé par l'administrateur.";
        case 'auth/user-not-found':
        case 'auth/invalid-credential':
        case 'auth/wrong-password':
          return "L'adresse e-mail ou le mot de passe est incorrect.";
        case 'auth/email-already-in-use':
          return "Un compte existe déjà avec cette adresse e-mail.";
        case 'auth/weak-password':
          return "Votre mot de passe est trop faible (6 caractères minimum).";
        case 'auth/network-request-failed':
          return "Problème de connexion internet. Vérifiez votre réseau.";
        case 'auth/requires-recent-login':
          return "Sécurité : Veuillez vous déconnecter puis vous reconnecter pour faire cela.";
        default:
          return "Une erreur inattendue est survenue. Veuillez réessayer.";
      }
    }

    // ================= FORMATAGE TÉLÉPHONE =================
        document.addEventListener("DOMContentLoaded", () => {
          const phoneInput = document.getElementById("phone");
          
          // Si l'élément existe bien
          if(phoneInput) {
            phoneInput.addEventListener('input', function (e) {
              // 1. On supprime tout ce qui n'est pas un chiffre
              let cleaned = e.target.value.replace(/\D/g, '');
              
              // 2. On limite à 10 chiffres
              cleaned = cleaned.substring(0, 10);
              
              // 3. On groupe par 2 et on ajoute un espace entre chaque groupe
              let formatted = cleaned.match(/.{1,2}/g)?.join(' ') || '';
              
              // 4. On met à jour l'affichage
              e.target.value = formatted;
            });
          }
        });


    // ================= PALIERS DE RÉCOMPENSES =================
    const REWARD_TIERS = [
      { points: 40, title: "Gain 1", desc: "(ex: Boisson offerte)" },
      { points: 80, title: "Gain 2", desc: "(ex: Dessert offert)" },
      { points: 150, title: "Gain 3", desc: "(ex: Plat au choix)" },
      { points: 200, title: "Gain 4", desc: "(ex: Menu complet)" },
      { points: 260, title: "Gain 5", desc: "(ex: Repas pour 2)" }
    ];

    // ================= TOGGLE =================
     function toggleMode(){
      signupMode = !signupMode;
      document.getElementById("firstname-field").style.display = signupMode ? "block" : "none";
      document.getElementById("phone-field").style.display = signupMode ? "block" : "none";
      document.getElementById("confirm-password-field").style.display = signupMode ? "block" : "none";
      
      // NOUVEAU : Cacher le bouton "Mot de passe oublié" en mode inscription
      document.getElementById("forgot-password-container").style.display = signupMode ? "none" : "block";
      
      document.getElementById("auth-title").innerText = signupMode ? "Créez votre compte fidélité" : "Connectez-vous à votre espace";
      document.getElementById("auth-btn").innerText = signupMode ? "S'inscrire" : "Se connecter";
      document.getElementById("toggle-btn").innerText = signupMode ? "Déjà membre ? Se connecter" : "Créer un compte";
    }

    // ================= AUTH =================
async function handleAuth(){
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();

        showAuthMsg("Le numéro de téléphone est requis");

      if(password !== confirmPassword) {
        showAuthMsg("Les mots de passe ne correspondent pas");

      if(password.length < 6) {
        showAuthMsg("Le mot de passe doit faire au moins 6 caractères");

      await profiles.doc(res.user.uid).set({
        first_name: firstname || "Client",
        email: email,
        phone: phone,
        points: 0,
        short_code: shortCode,
        role: "membre",
        created_at: firebase.firestore.FieldValue.serverTimestamp()
      });
    } else {
      await auth.signInWithEmailAndPassword(email, password);
    }
    } catch (err) {
          // On utilise notre nouvelle fonction avec err.code
          showAuthMsg(getErrorMessage(err.code)); 
    }
}

      // Charger l'événement actif s'il existe
      loadActiveEvent();

      const qrContainer = document.getElementById("qrcode");
      qrContainer.innerHTML="";
      new QRCode(qrContainer,{
        text: data.short_code,
        width: 150,
        height: 150
      });

      // --- Chargement de la barre de progression ---
      const timelineContainer = document.getElementById("timeline-container");
      
      const currentPoints = Math.min(data.points, 260); 

      const VISUAL_STEPS = [
        { points: 40, visualPercent: 0 },
        { points: 80, visualPercent: 25 },
        { points: 150, visualPercent: 50 },
        { points: 200, visualPercent: 75 },
        { points: 260, visualPercent: 100 }
      ];

      let progressPercent = 0;
      if (currentPoints < 40) {
        progressPercent = 0;
      } else if (currentPoints >= 260) {
        progressPercent = 100;
      } else {
        for (let i = 0; i < VISUAL_STEPS.length - 1; i++) {
          const start = VISUAL_STEPS[i];
          const end = VISUAL_STEPS[i+1];
          
          if (currentPoints >= start.points && currentPoints < end.points) {
            const rangePoints = end.points - start.points;
            const rangeVisual = end.visualPercent - start.visualPercent;
            const pointsInSegment = currentPoints - start.points;
            
            progressPercent = start.visualPercent + ((pointsInSegment / rangePoints) * rangeVisual);
            break;
          }
        }
      }

      timelineContainer.innerHTML = `
        <div class="absolute top-11 left-0 right-0 h-1.5 bg-stone-200 rounded-full -translate-y-1/2"></div>
        <div class="absolute top-11 left-0 h-1.5 bg-orange-500 rounded-full -translate-y-1/2 transition-all duration-1000 ease-out" style="width: 0%" id="progress-line"></div>
      `;

      setTimeout(() => {
        document.getElementById("progress-line").style.width = `${progressPercent}%`;
      }, 100);

      let nextTierPoints = null;

      REWARD_TIERS.forEach((tier, index) => {
        const isUnlocked = data.points >= tier.points;
        if (!isUnlocked && nextTierPoints === null) {
          nextTierPoints = tier.points;
        }

        const visualPosition = index * 25;

        const nodeDiv = document.createElement("div");
        nodeDiv.className = "absolute top-0 flex flex-col items-center w-12";
        nodeDiv.style.left = `calc(${visualPosition}% - 24px)`;

        const iconSvg = isUnlocked 
          ? `<svg class="w-5 h-5 text-white" fill="currentColor" viewBox="0 0 20 20"><path d="M10 2a5 5 0 00-5 5v2a2 2 0 00-2 2v5a2 2 0 002 2h10a2 2 0 002-2v-5a2 2 0 00-2-2H7V7a3 3 0 015.905-.75 1 1 0 001.937-.5A5.002 5.002 0 0010 2z"></path></svg>`
          : `<svg class="w-4 h-4 text-stone-400" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clip-rule="evenodd"></path></svg>`;

        const circleColor = isUnlocked ? "bg-orange-500 border-2 border-orange-500 shadow-md" : "bg-white border-2 border-stone-200";
        const textColor = isUnlocked ? "text-orange-600" : "text-stone-400";

        nodeDiv.innerHTML = `
          <span class="text-xs font-black mb-2 leading-none ${textColor}">${tier.points}</span>
          <div class="w-10 h-10 ${circleColor} rounded-full flex items-center justify-center z-10 transition-colors duration-500">
            ${iconSvg}
          </div>
        `;
        timelineContainer.appendChild(nodeDiv);
      });

      const nextTierText = document.getElementById("next-tier-text");
      if (nextTierPoints) {
        const pointsNeeded = nextTierPoints - data.points;
        nextTierText.innerText = `Plus que ${pointsNeeded} points pour déverrouiller le prochain palier.`;
      } else {
        nextTierText.innerText = "Félicitations, vous avez débloqué tous les paliers !";
      }

      // --- Chargement de la liste des récompenses (avec événement) ---
      await renderClientRewards(data.points);

      // --- Chargement de l'historique Client ---
      const historyContainer = document.getElementById("client-history");
      historyContainer.innerHTML = '<p class="text-sm text-stone-400 text-center">Chargement...</p>';

      try {
        const snapshot = await profiles.doc(uid).collection("transactions")
          .orderBy("date", "desc")
          .limit(10)
          .get();

        historyContainer.innerHTML = "";

        if(snapshot.empty){
          historyContainer.innerHTML = '<p class="text-sm text-stone-400 text-center">Aucun point cumulé pour le moment.</p>';
          return;
        }

        snapshot.forEach(doc => {
          const tx = doc.data();
          const dateObj = tx.date ? tx.date.toDate() : new Date();
          const dateStr = dateObj.toLocaleDateString("fr-FR", {day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit'});

          const isPositive = tx.points_added > 0;
          const pointColor = isPositive ? "text-orange-600" : "text-stone-500";
          const pointSign = isPositive ? "+" : "";

          let libelle = tx.description;
          if (!libelle) {
            libelle = isPositive ? `Commande de ${tx.amount_euros}€` : "Récompense utilisée";
          }

          const li = document.createElement("li");
          li.className = "flex justify-between items-center bg-stone-50 p-3 rounded-xl";
          
          li.innerHTML = `
            <div class="flex flex-col text-left">
              <span class="text-sm font-bold text-stone-700">${libelle}</span>
              <span class="text-xs font-medium text-stone-400">${dateStr}</span>
            </div>
            <span class="text-sm font-black ${pointColor} whitespace-nowrap ml-2">${pointSign} ${tx.points_added} pts</span>
          `;
          historyContainer.appendChild(li);
        });
      } catch (err) {
        console.error(err);
        historyContainer.innerHTML = '<p class="text-sm text-red-500 text-center">Erreur de chargement de l\'historique.</p>';
      }
    }

    // --- Changer le mot de passe ---
    async function handleChangePassword() {
      const currentPw = document.getElementById("profile-current-pw").value;
      const newPw = document.getElementById("profile-new-pw").value;
      const confirmPw = document.getElementById("profile-confirm-pw").value;

      if (!currentPw || !newPw || !confirmPw) {
        showProfileFeedback("pw-feedback", "Veuillez remplir tous les champs.", "error");
        return;
      }

      if (newPw.length < 6) {
        showProfileFeedback("pw-feedback", "Le nouveau mot de passe doit faire au moins 6 caractères.", "error");
        return;
      }

      if (newPw !== confirmPw) {
        showProfileFeedback("pw-feedback", "Les nouveaux mots de passe ne correspondent pas.", "error");
        return;
      }

      try {
        const user = auth.currentUser;
        const credential = firebase.auth.EmailAuthProvider.credential(user.email, currentPw);
        
        // Ré-authentification
        await user.reauthenticateWithCredential(credential);
        
        // Mise à jour du mot de passe
        await user.updatePassword(newPw);

        showProfileFeedback("pw-feedback", "✓ Mot de passe modifié avec succès !", "success");
        document.getElementById("profile-current-pw").value = "";
        document.getElementById("profile-new-pw").value = "";
        document.getElementById("profile-confirm-pw").value = "";

        // Fermer la section après 2 secondes
        setTimeout(() => { toggleChangePassword(); }, 2000);

      } catch (error) {
        console.error("Erreur changement mdp:", error);
        if (error.code === "auth/wrong-password" || error.code === "auth/invalid-credential") {
          showProfileFeedback("pw-feedback", "Le mot de passe actuel est incorrect.", "error");
        } else {
          showProfileFeedback("pw-feedback", getErrorMessage(error.code), "error");
        }
      }
    }

    // ================= ÉVÉNEMENTS =================
    
    // Charger l'événement actif le plus proche
    async function loadActiveEvent() {
      try {
        const now = new Date();
        
        // Récupérer tous les événements actifs (sans orderBy pour éviter l'index)
        const snapshot = await events
          .where("active", "==", true)
          .get();

        if (snapshot.empty) {
          return;
        }

        // Filtrer et trier côté client
        const futureEvents = [];
        snapshot.forEach(doc => {
          const event = doc.data();
          const deadline = event.deadline.toDate();
          
          // Garder seulement les événements futurs
          if (deadline > now) {
            futureEvents.push({
              ...event,
              deadlineDate: deadline
            });
          }
        });

        // Trier par date (le plus proche en premier)
        futureEvents.sort((a, b) => a.deadlineDate - b.deadlineDate);

        // Afficher le premier événement
        if (futureEvents.length > 0) {
          displayEventBanner(futureEvents[0]);
        }
        
      } catch (err) {
        console.error("Erreur chargement événement:", err);
      }
    }

    // Afficher la banderole avec l'événement
    function displayEventBanner(event) {
      const banner = document.getElementById("event-banner");
      const nameEl = document.getElementById("event-name");
      const bgImg = document.getElementById("event-banner-bg");
      const optionsEl = document.getElementById("event-options");

      nameEl.textContent = event.title;
      
      if (event.imageUrl) {
        bgImg.src = event.imageUrl;
      }

      // Afficher les options si présentes
      optionsEl.innerHTML = '';
      if (event.options) {
        if (event.options.doublePoints) {
          optionsEl.innerHTML += '<span class="bg-white bg-opacity-30 px-3 py-1.5 rounded-full text-sm font-bold">🎯 Points x2 sur vos achats</span>';
        }
        if (event.options.bonusExisting) {
          optionsEl.innerHTML += `<span class="bg-white bg-opacity-30 px-3 py-1.5 rounded-full text-sm font-bold">💰 +${event.options.bonusAmount} points bonus</span>`;
        }
        if (event.options.specialReward) {
          optionsEl.innerHTML += `<span class="bg-white bg-opacity-30 px-3 py-1.5 rounded-full text-sm font-bold">🎁 ${event.options.rewardName}</span>`;
        }
      }

      banner.classList.remove("hidden");

      // Démarrer le compte à rebours (utiliser deadlineDate qui est déjà converti)
      startCountdown(event.deadlineDate || event.deadline.toDate());
    }

    // Compte à rebours en temps réel (jours et heures uniquement)
    function startCountdown(deadline) {
      // Nettoyer l'ancien intervalle
      if (countdownInterval) {
        clearInterval(countdownInterval);
      }

      function updateCountdown() {
        const now = new Date();
        const diff = deadline - now;

        if (diff <= 0) {
          clearInterval(countdownInterval);
          document.getElementById("event-banner").classList.add("hidden");
          return;
        }

        const days = Math.floor(diff / (1000 * 60 * 60 * 24));
        const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));

        document.getElementById("days").textContent = String(days).padStart(2, '0');
        document.getElementById("hours").textContent = String(hours).padStart(2, '0');
      }

      updateCountdown();
      // Mise à jour toutes les minutes (pas besoin de chaque seconde)
      countdownInterval = setInterval(updateCountdown, 60000);
    }
