<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Restaurant Fidélité</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>

<body class="bg-stone-100 min-h-screen flex items-center justify-center p-4 relative">

<div id="auth" class="bg-white p-8 rounded-3xl shadow-xl w-full max-w-md">
  <h2 id="auth-title" class="text-2xl font-black text-center mb-6">Connexion</h2>

  <div id="firstname-field" class="hidden mb-4">
    <input id="firstname" type="text" placeholder="Prénom"
      class="w-full p-3 bg-stone-100 rounded-xl">
  </div>

  <input id="email" type="email" placeholder="Email"
    class="w-full p-3 bg-stone-100 rounded-xl mb-4">

  <div id="phone-field" class="hidden mb-4">
    <input id="phone" type="tel" placeholder="Numéro de téléphone" maxlength="14"
      class="w-full p-3 bg-stone-100 rounded-xl">
  </div>

  <input id="password" type="password" placeholder="Mot de passe"
    class="w-full p-3 bg-stone-100 rounded-xl mb-4">

  <div id="confirm-password-field" class="hidden mb-4">
    <input id="confirm-password" type="password" placeholder="Confirmer le mot de passe"
      class="w-full p-3 bg-stone-100 rounded-xl">
  </div>

  <div id="forgot-password-container" class="text-right mb-4">
    <button onclick="resetPassword()" class="text-sm text-orange-600 hover:underline">
      Mot de passe oublié ?
    </button>
  </div>

  <button onclick="handleAuth()" id="auth-btn"
    class="w-full bg-orange-600 text-white p-3 rounded-xl font-bold">
    Se connecter
  </button>

  <button onclick="toggleMode()" id="toggle-btn"
    class="text-sm text-stone-400 mt-4 w-full">
    Créer un compte
  </button>

  <p id="auth-msg" class="text-center text-red-500 mt-4 hidden"></p>
</div>

  <div id="client-dashboard" class="hidden bg-white p-8 rounded-3xl shadow-xl w-full max-w-md text-center">

    <h2 class="text-2xl font-black mb-1">
      Bonjour <span id="client-name" class="text-orange-600"></span>
    </h2>

    <div id="client-rank" class="inline-block bg-orange-100 text-orange-700 text-xs font-black px-3 py-1 rounded-full mb-4 uppercase tracking-wider">
      Chargement du rang...
    </div>

    <div class="mb-4">
      <span class="text-6xl font-black text-stone-800" id="client-points">0</span>
      <span class="block text-lg font-bold text-stone-500 mt-1">points disponibles</span>
    </div>

    <div id="qrcode" class="flex justify-center mb-4"></div>
    <p id="client-code" class="font-mono text-2xl mb-2"></p>

    <div class="mt-6 mb-2 w-full px-6">
      <div id="timeline-container" class="relative w-full h-16">
        </div>
      <p id="next-tier-text" class="mt-4 text-sm font-bold text-stone-600 text-center"></p>
    </div>

    <div class="mt-8 text-left w-full">
      <h3 class="text-lg font-bold text-stone-800 mb-3 border-b-2 border-stone-100 pb-2">Vos Paliers</h3>
      <ul id="client-rewards" class="space-y-3">
        </ul>
    </div>

    <div class="mt-8 text-left w-full">
      <h3 class="text-lg font-bold text-stone-800 mb-3 border-b-2 border-stone-100 pb-2">Historique récent</h3>
      <ul id="client-history" class="space-y-2 max-h-64 overflow-y-auto">
      </ul>
    </div>

    <button onclick="logout()" class="mt-4 text-sm text-red-500">
      Déconnexion
    </button>

    <button id="show-delete-btn" onclick="showDeleteSection()" 
      class="w-full mt-8 bg-red-100 text-red-600 p-3 rounded-xl font-bold hover:bg-red-200 transition">
      Supprimer mon compte
    </button>

    <div id="delete-confirm-section" class="hidden mt-4 p-4 bg-red-50 border border-red-200 rounded-xl">
      <p class="text-sm text-red-700 font-bold mb-3">Veuillez confirmer vos identifiants pour supprimer définitivement votre compte :</p>
      
      <input id="delete-email" type="email" placeholder="Votre email" 
        class="w-full p-3 mb-2 bg-white border border-red-200 rounded-xl text-sm">
      <input id="delete-password" type="password" placeholder="Votre mot de passe" 
        class="w-full p-3 mb-3 bg-white border border-red-200 rounded-xl text-sm">
      
      <div class="flex gap-2">
        <button onclick="cancelDelete()" 
          class="flex-1 bg-stone-200 text-stone-700 p-3 rounded-xl font-bold hover:bg-stone-300 transition">
          Annuler
        </button>
        <button onclick="confirmDeleteAccount()" 
          class="flex-1 bg-red-600 text-white p-3 rounded-xl font-bold hover:bg-red-700 transition">
          Confirmer
        </button>
      </div>
    </div>
  </div>

  <script>
    // ================= FIREBASE CONFIG =================
    const firebaseConfig = {
      apiKey: "AIzaSyDf8Oh-d4baOxu3XoPV2rnLeLJZQ5tZDYY",
      authDomain: "rylia-fidelite-9a015.firebaseapp.com",
      projectId: "rylia-fidelite-9a015"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    // ================= CLIENT CONFIG =================
    // 👇 Modifier cette valeur pour chaque commerçant
    const CLIENT_ID = "rylia";
    // Raccourci vers la collection du client dans Firestore
    // Structure : clients/{CLIENT_ID}/profiles/{uid}
    const profiles = db.collection("clients").doc(CLIENT_ID).collection("profiles");

    let signupMode = false;

    // ================= TRADUCTION DES ERREURS =================
    function getErrorMessage(errorCode) {
      switch (errorCode) {
        case 'auth/invalid-email':
          return "L'adresse e-mail n'est pas valide.";
        case 'auth/user-disabled':
          return "Ce compte a été désactivé par l'administrateur.";
        case 'auth/user-not-found':
        case 'auth/invalid-credential':
        case 'auth/wrong-password':
          return "L'adresse e-mail ou le mot de passe est incorrect.";
        case 'auth/email-already-in-use':
          return "Un compte existe déjà avec cette adresse e-mail.";
        case 'auth/weak-password':
          return "Votre mot de passe est trop faible (6 caractères minimum).";
        case 'auth/network-request-failed':
          return "Problème de connexion internet. Vérifiez votre réseau.";
        case 'auth/requires-recent-login':
          return "Sécurité : Veuillez vous déconnecter puis vous reconnecter pour faire cela.";
        default:
          return "Une erreur inattendue est survenue. Veuillez réessayer.";
      }
    }

    // ================= FORMATAGE TÉLÉPHONE =================
        document.addEventListener("DOMContentLoaded", () => {
          const phoneInput = document.getElementById("phone");
          
          // Si l'élément existe bien
          if(phoneInput) {
            phoneInput.addEventListener('input', function (e) {
              // 1. On supprime tout ce qui n'est pas un chiffre
              let cleaned = e.target.value.replace(/\D/g, '');
              
              // 2. On limite à 10 chiffres
              cleaned = cleaned.substring(0, 10);
              
              // 3. On groupe par 2 et on ajoute un espace entre chaque groupe
              let formatted = cleaned.match(/.{1,2}/g)?.join(' ') || '';
              
              // 4. On met à jour l'affichage
              e.target.value = formatted;
            });
          }
        });


    // ================= PALIERS DE RÉCOMPENSES =================
    const REWARD_TIERS = [
      { points: 40, title: "Gain 1", desc: "(ex: Boisson offerte)" },
      { points: 80, title: "Gain 2", desc: "(ex: Dessert offert)" },
      { points: 150, title: "Gain 3", desc: "(ex: Plat au choix)" },
      { points: 200, title: "Gain 4", desc: "(ex: Menu complet)" },
      { points: 260, title: "Gain 5", desc: "(ex: Repas pour 2)" }
    ];

    // ================= TOGGLE =================
     function toggleMode(){
      signupMode = !signupMode;
      document.getElementById("firstname-field").classList.toggle("hidden", !signupMode);
      document.getElementById("phone-field").classList.toggle("hidden", !signupMode);
      document.getElementById("confirm-password-field").classList.toggle("hidden", !signupMode);
      
      // NOUVEAU : Cacher le bouton "Mot de passe oublié" en mode inscription
      document.getElementById("forgot-password-container").classList.toggle("hidden", signupMode);
      
      document.getElementById("auth-title").innerText = signupMode ? "Créer un compte" : "Connexion";
      document.getElementById("auth-btn").innerText = signupMode ? "S'inscrire" : "Se connecter";
      document.getElementById("toggle-btn").innerText = signupMode ? "Déjà membre ?" : "Créer un compte";
    }

    // ================= AUTH =================
async function handleAuth(){
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();
  const firstname = document.getElementById("firstname").value.trim();
  
  // Nouveau champ téléphone au lieu de confirm-email
  const phone = document.getElementById("phone").value.trim();
  const confirmPassword = document.getElementById("confirm-password").value.trim();

  if(!email || !password){
    showAuthMsg("Email et mot de passe requis");
    return;
  }

  try{
    if(signupMode){
      // --- VERIFICATIONS ---
      // phone //
      const phoneClean = phone.replace(/\s/g, ''); // On retire les espaces pour compter les chiffres

      if(!phoneClean) {
        showAuthMsg("Le numéro de téléphone est requis");
        return;
      }
      if(phoneClean.length !== 10) {
        showAuthMsg("Le numéro de téléphone doit contenir exactement 10 chiffres");
        return;
      }

      // password //
      if(password !== confirmPassword) {
        showAuthMsg("Les mots de passe ne correspondent pas");
        return;
      }
      if(password.length < 6) {
        showAuthMsg("Le mot de passe doit faire au moins 6 caractères");
        return;
      }
      // ---------------------

      const res = await auth.createUserWithEmailAndPassword(email, password);
      const shortCode = Math.random().toString(36).substring(2,8).toUpperCase();

      await profiles.doc(res.user.uid).set({
        first_name: firstname || "Client",
        email: email,
        phone: phone,
        points: 0,
        short_code: shortCode,
        role: "membre",
        created_at: firebase.firestore.FieldValue.serverTimestamp()
      });
    } else {
      await auth.signInWithEmailAndPassword(email, password);
    }
    } catch (err) {
          // On utilise notre nouvelle fonction avec err.code
          showAuthMsg(getErrorMessage(err.code)); 
    }
}

    function showAuthMsg(msg){
      const m = document.getElementById("auth-msg");
      m.innerText = msg;
      m.className = "text-center mt-4 text-red-500";
      m.classList.remove("hidden");
    }

    // ================= ROLE DETECTION =================
    auth.onAuthStateChanged(async user => {
      if(!user){
        showAuth();
        return;
      }

      const doc = await profiles.doc(user.uid).get();
      if(!doc.exists){
        logout();
        return;
      }

      const data = doc.data();
      if(data.role === "admin"){
        window.location.href = "admin.html";
      } else {
        showClient(data, user.uid);
      }
    });

    // ================= SHOW CLIENT =================
    async function showClient(data, uid){
      document.getElementById("auth").classList.add("hidden");
      document.getElementById("client-dashboard").classList.remove("hidden");

      document.getElementById("client-name").innerText = data.first_name;
      document.getElementById("client-points").innerText = data.points;
      document.getElementById("client-code").innerText = data.short_code;

      // Calcul du rang
      calculateRank(data.points);

      const qrContainer = document.getElementById("qrcode");
      qrContainer.innerHTML="";
      new QRCode(qrContainer,{
        text: data.short_code,
        width: 150,
        height: 150
      });

      // --- Chargement de la barre de progression ---
      const timelineContainer = document.getElementById("timeline-container");
      
      const currentPoints = Math.min(data.points, 260); 

      const VISUAL_STEPS = [
        { points: 40, visualPercent: 0 },
        { points: 80, visualPercent: 25 },
        { points: 150, visualPercent: 50 },
        { points: 200, visualPercent: 75 },
        { points: 260, visualPercent: 100 }
      ];

      let progressPercent = 0;
      if (currentPoints < 40) {
        progressPercent = 0;
      } else if (currentPoints >= 260) {
        progressPercent = 100;
      } else {
        for (let i = 0; i < VISUAL_STEPS.length - 1; i++) {
          const start = VISUAL_STEPS[i];
          const end = VISUAL_STEPS[i+1];
          
          if (currentPoints >= start.points && currentPoints < end.points) {
            const rangePoints = end.points - start.points;
            const rangeVisual = end.visualPercent - start.visualPercent;
            const pointsInSegment = currentPoints - start.points;
            
            progressPercent = start.visualPercent + ((pointsInSegment / rangePoints) * rangeVisual);
            break;
          }
        }
      }

      timelineContainer.innerHTML = `
        <div class="absolute top-11 left-0 right-0 h-1.5 bg-stone-200 rounded-full -translate-y-1/2"></div>
        <div class="absolute top-11 left-0 h-1.5 bg-orange-500 rounded-full -translate-y-1/2 transition-all duration-1000 ease-out" style="width: 0%" id="progress-line"></div>
      `;

      setTimeout(() => {
        document.getElementById("progress-line").style.width = `${progressPercent}%`;
      }, 100);

      let nextTierPoints = null;

      REWARD_TIERS.forEach((tier, index) => {
        const isUnlocked = data.points >= tier.points;
        if (!isUnlocked && nextTierPoints === null) {
          nextTierPoints = tier.points;
        }

        const visualPosition = index * 25;

        const nodeDiv = document.createElement("div");
        nodeDiv.className = "absolute top-0 flex flex-col items-center w-12";
        nodeDiv.style.left = `calc(${visualPosition}% - 24px)`;

        const iconSvg = isUnlocked 
          ? `<svg class="w-5 h-5 text-white" fill="currentColor" viewBox="0 0 20 20"><path d="M10 2a5 5 0 00-5 5v2a2 2 0 00-2 2v5a2 2 0 002 2h10a2 2 0 002-2v-5a2 2 0 00-2-2H7V7a3 3 0 015.905-.75 1 1 0 001.937-.5A5.002 5.002 0 0010 2z"></path></svg>`
          : `<svg class="w-4 h-4 text-stone-400" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clip-rule="evenodd"></path></svg>`;

        const circleColor = isUnlocked ? "bg-orange-500 border-2 border-orange-500 shadow-md" : "bg-white border-2 border-stone-200";
        const textColor = isUnlocked ? "text-orange-600" : "text-stone-400";

        nodeDiv.innerHTML = `
          <span class="text-xs font-black mb-2 leading-none ${textColor}">${tier.points}</span>
          <div class="w-10 h-10 ${circleColor} rounded-full flex items-center justify-center z-10 transition-colors duration-500">
            ${iconSvg}
          </div>
        `;
        timelineContainer.appendChild(nodeDiv);
      });

      const nextTierText = document.getElementById("next-tier-text");
      if (nextTierPoints) {
        const pointsNeeded = nextTierPoints - data.points;
        nextTierText.innerText = `Plus que ${pointsNeeded} points pour déverrouiller le prochain palier.`;
      } else {
        nextTierText.innerText = "Félicitations, vous avez débloqué tous les paliers !";
      }

      // --- Chargement de la liste textuelle des cadeaux adaptées pour mobile ---
      const rewardsContainer = document.getElementById("client-rewards");
      rewardsContainer.innerHTML = "";

      REWARD_TIERS.forEach(tier => {
        const isUnlocked = data.points >= tier.points;
        const li = document.createElement("li");
        
        if (isUnlocked) {
          const unlockedSvg = `<svg class="w-4 h-4 mr-2 mt-0.5 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20"><path d="M10 2a5 5 0 00-5 5v2a2 2 0 00-2 2v5a2 2 0 002 2h10a2 2 0 002-2v-5a2 2 0 00-2-2H7V7a3 3 0 015.905-.75 1 1 0 001.937-.5A5.002 5.002 0 0010 2z"></path></svg>`;
          
          li.className = "flex justify-between items-center bg-orange-50 border border-orange-200 p-3 rounded-xl";
          li.innerHTML = `
            <div class="flex items-start">
              ${unlockedSvg}
              <div class="flex flex-col text-left">
                <span class="text-sm font-bold text-orange-700">${tier.title}</span>
                <span class="text-xs font-medium text-orange-600/80">${tier.desc}</span>
              </div>
            </div>
            <span class="text-xs font-black text-white bg-orange-500 px-3 py-1 rounded-full shadow-sm whitespace-nowrap ml-2">Débloqué !</span>
          `;
        } else {
          const lockedSvg = `<svg class="w-4 h-4 mr-2 mt-0.5 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clip-rule="evenodd"></path></svg>`;
          
          li.className = "flex justify-between items-center bg-stone-50 border border-stone-200 p-3 rounded-xl opacity-80";
          li.innerHTML = `
            <div class="flex items-start">
              ${lockedSvg}
              <div class="flex flex-col text-left">
                <span class="text-sm font-medium text-stone-500">${tier.title}</span>
                <span class="text-xs font-medium text-stone-400">${tier.desc}</span>
              </div>
            </div>
            <span class="text-xs font-bold text-stone-400 whitespace-nowrap ml-2">${data.points}/${tier.points} points</span>
          `;
        }
        rewardsContainer.appendChild(li);
      });

      // --- Chargement de l'historique Client ---
      const historyContainer = document.getElementById("client-history");
      historyContainer.innerHTML = '<p class="text-sm text-stone-400 text-center">Chargement...</p>';

      try {
        const snapshot = await profiles.doc(uid).collection("transactions")
          .orderBy("date", "desc")
          .limit(10)
          .get();

        historyContainer.innerHTML = "";

        if(snapshot.empty){
          historyContainer.innerHTML = '<p class="text-sm text-stone-400 text-center">Aucun point cumulé pour le moment.</p>';
          return;
        }

        snapshot.forEach(doc => {
          const tx = doc.data();
          const dateObj = tx.date ? tx.date.toDate() : new Date();
          const dateStr = dateObj.toLocaleDateString("fr-FR", {day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit'});

          const isPositive = tx.points_added > 0;
          const pointColor = isPositive ? "text-orange-600" : "text-stone-500";
          const pointSign = isPositive ? "+" : "";

          let libelle = tx.description;
          if (!libelle) {
            libelle = isPositive ? `Commande de ${tx.amount_euros}€` : "Récompense utilisée";
          }

          const li = document.createElement("li");
          li.className = "flex justify-between items-center bg-stone-50 p-3 rounded-xl";
          
          li.innerHTML = `
            <div class="flex flex-col text-left">
              <span class="text-sm font-bold text-stone-700">${libelle}</span>
              <span class="text-xs font-medium text-stone-400">${dateStr}</span>
            </div>
            <span class="text-sm font-black ${pointColor} whitespace-nowrap ml-2">${pointSign} ${tx.points_added} pts</span>
          `;
          historyContainer.appendChild(li);
        });
      } catch (err) {
        console.error(err);
        historyContainer.innerHTML = '<p class="text-sm text-red-500 text-center">Erreur de chargement de l\'historique.</p>';
      }
    }

    // AJOUT : Fonction calcul rang client
    async function calculateRank(points) {
      const snap = await profiles
        .where("role", "==", "membre")
        .where("points", ">", points)
        .get();
      const rank = snap.size + 1;
      document.getElementById("client-rank").innerText = `#${rank}${rank === 1 ? 'er' : 'ème'} des clients les plus fidèles`;
    }

    // ================= UTIL =================
    function logout(){
      auth.signOut();
    }

    function showAuth(){
      document.getElementById("auth").classList.remove("hidden");
      document.getElementById("client-dashboard").classList.add("hidden");
    }


    // ======== RESET MOT DE PASSE ========= //
    async function resetPassword() {
  const email = document.getElementById("email").value.trim();
  
  // On vérifie que l'utilisateur a bien tapé un email
  if (!email) {
    showAuthMsg("Veuillez saisir votre email dans le champ ci-dessus, puis cliquez sur 'Mot de passe oublié ?'");
    return;
  }

  try {
    // Demande à Firebase d'envoyer l'email
    await auth.sendPasswordResetEmail(email);
    // On réutilise ta fonction d'erreur pour afficher un message de succès (tu peux changer la couleur si besoin)
    showAuthMsg("Un lien de réinitialisation a été envoyé à " + email); 
  } catch (err) {
    // Si l'email n'existe pas ou s'il y a une erreur
    showAuthMsg("Erreur : " + err.message);
  }
}

// ================= SUPPRESSION DE COMPTE =================
    
    // 1. Affiche le formulaire de suppression
    function showDeleteSection() {
      document.getElementById("show-delete-btn").classList.add("hidden");
      document.getElementById("delete-confirm-section").classList.remove("hidden");
    }

    // 2. Annule et cache le formulaire
    function cancelDelete() {
      document.getElementById("delete-confirm-section").classList.add("hidden");
      document.getElementById("show-delete-btn").classList.remove("hidden");
      document.getElementById("delete-email").value = "";
      document.getElementById("delete-password").value = "";
    }

    // 3. Valide les identifiants et supprime le compte
    async function confirmDeleteAccount() {
      const user = auth.currentUser;
      if (!user) return;

      const email = document.getElementById("delete-email").value.trim();
      const password = document.getElementById("delete-password").value.trim();

      if (!email || !password) {
        alert("Veuillez remplir votre email et votre mot de passe.");
        return;
      }

      // On prépare les identifiants pour Firebase
      const credential = firebase.auth.EmailAuthProvider.credential(email, password);

      try {
        // Étape A : On ré-authentifie l'utilisateur pour des raisons de sécurité
        await user.reauthenticateWithCredential(credential);
        
        // Étape B : Si le mot de passe est bon, on supprime ses données Firestore
        await profiles.doc(user.uid).delete();
        
        // Étape C : On supprime son compte de connexion
        await user.delete();
        
        alert("Votre compte a été supprimé avec succès.");
        // Le système détectera la déconnexion et renverra vers l'accueil tout seul !
        
      } catch (error) {
        console.error("Erreur de suppression :", error);
        alert(getErrorMessage(error.code)); 
      }
    }

    // FONCTION PAGE LÉGALE
      function openLegalPage() {
          const legalWindow = window.open("", "_blank");
          legalWindow.document.write(`
              <html>
              <head>
                  <title>CGU & Mentions Légales</title>
                  <style>
                      body { 
                          font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
                          line-height: 1.6; 
                          padding: 50px; 
                          color: #2d2d2d; 
                          max-width: 750px; 
                          margin: auto; 
                      }
                      h1 { font-size: 1.5rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 40px; border-bottom: 2px solid #000; padding-bottom: 10px; }
                      h2 { font-size: 1.2rem; font-weight: 700; margin-top: 30px; }
                      h3 { font-size: 1rem; font-weight: 700; color: #555; }
